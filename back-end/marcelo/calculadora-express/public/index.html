<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Calculadora Express</title>

    <script src="script.js" defer></script>
</head>

<body>
   
    <input type="number" id="first-number" placeholder="numero 1"> 
    <input type="number" id="second-number" placeholder="numero 2"> 

    <br>

    <span>Operação: </span>

   <select name="" id="select-operation">
       <option value="soma">Soma</option>
       <option value="subtracao">Subtração</option>
       <option value="multiplicacao">Multiplicação</option>
       <option value="divisao">Divisão</option>
   </select>

   <button id="send-operation">Enviar</button>

   <br>

   <h1 id="result"></h1>
    
</body>
