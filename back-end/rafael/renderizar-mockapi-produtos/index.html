<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>

<body>

    <form id="post-product">
        <input type="text" id="product-name-input" placeholder="nome" required>
        <input type="number" id="product-price-input" placeholder="preco" required>
        <input type="text" id="product-description-input" placeholder="descricao" required>
        <input type="text" id="product-img-input" placeholder="imagem" required>
        <input type="text" id="product-category-input" placeholder="categoria" required>  
        <button type="submit">enviar</button>  
    </form>
    

    
    <div id="products-container">

    </div>

</body>

</html>
