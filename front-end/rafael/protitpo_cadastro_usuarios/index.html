<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>

<body>
    
    <form id="user-register">
        <div class="register-container">

            <div class="input-name">
                <label for="#register-name-input">Nome: </label>
                <input type="text" id="register-name-input" placeholder="Escreva seu nome." required>
            </div>

            <div class="input-email">
                <label for="#register-email-input">E-mail: </label>
                <input type="email" id="register-email-input" placeholder="Escreva seu email." required>
            </div>

            <div class="input-role">
                <label for="#register-role-input">Função: </label>
                <input type="text" id="register-role-input" placeholder="Escreva sua função." required>
            </div>

            <button type="submit" id="submit-user-register">Enviar</button>
            
        <div class="register-container">        
    </form>

    <div class="user-cards">

    </div>

</body>

</html>
